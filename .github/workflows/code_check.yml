name: Code Quality Check

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  quality-security-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create reports dir
        run: mkdir -p reports

      - name: Run flake8
        id: flake8
        continue-on-error: true
        run: |
          flake8 oracle smart_contracts tests scripts/ci > reports/flake8.txt

      - name: Run pylint
        id: pylint
        continue-on-error: true
        run: |
          pylint oracle smart_contracts tests scripts/ci > reports/pylint.txt

      - name: Run mypy
        id: mypy
        continue-on-error: true
        run: |
          mypy --config-file mypy.ini oracle smart_contracts scripts/ci > reports/mypy.txt

      - name: Run pytest
        id: pytest
        continue-on-error: true
        run: |
          pytest -q tests/test_backend_free_stack.py tests/test_frontend_oracle.py > reports/pytest.txt

      - name: Security reality check
        id: security
        continue-on-error: true
        run: |
          python scripts/ci/security_reality_check.py

      - name: AI test case generator
        id: ai_tests
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
        run: |
          python scripts/ci/generate_ai_tests.py

      - name: Build verdict
        id: verdict
        if: always()
        env:
          FLAKE8_OUTCOME: ${{ steps.flake8.outcome }}
          PYLINT_OUTCOME: ${{ steps.pylint.outcome }}
          MYPY_OUTCOME: ${{ steps.mypy.outcome }}
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          SECURITY_OUTCOME: ${{ steps.security.outcome }}
          AI_TESTS_OUTCOME: ${{ steps.ai_tests.outcome }}
        run: |
          python scripts/ci/build_verdict.py

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: reports/

      - name: Post bot verdict comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("reports/verdict.md", "utf8");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
