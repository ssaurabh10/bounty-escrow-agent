        <p style="color:var(--text-secondary); font-size:13px; line-height:1.65; margin:0 0 16px;">
          Export a portable JSON backup of this browser’s bounty database and oracle test materials. Import it after a redeploy, browser reset, or on another machine to restore your local workspace.
        </p>
        <div style="display:flex; flex-wrap:wrap; gap:12px;">
          <button type="button" class="btn btn-primary" onclick="downloadLocalBackup()">Export local backup</button>
          <button type="button" class="btn btn-secondary" onclick="triggerBackupImport()">Import backup</button>
          <input type="file" id="backupImportInput" accept="application/json,.json" style="display:none" onchange="handleBackupImport(event)">
        </div>
        <div style="margin-top:12px; font-size:12px; color:var(--text-secondary); line-height:1.6;">
          Keep the backup file safe. It contains your local demo bounty records and any saved oracle test material.
        </div>
      </div>

      <div class="profile-dash__rules">
        <strong>Score Deltas (Contract Rules):</strong><br>
        <span class="ico"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span> Approved: <span style="color:var(--success)">+${SCORE_APPROVED}</span> ·
        <span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="7" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span> Auto-release: <span style="color:var(--success)">+${SCORE_AUTO}</span> ·
        <span class="ico"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span> Dispute Win: <span style="color:var(--success)">+${SCORE_DISPUTE_WIN}</span><br>
        <span class="ico"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span> Dispute Loss: <span style="color:var(--danger)">${SCORE_DISPUTE_LOSS}</span> ·
        <span class="ico"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Withdraw before submit: <span style="color:var(--warning)">${SCORE_WITHDRAW_ACCEPT}</span> ·
        <span class="ico"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Opt-out (after reject): <span style="color:var(--warning)">${SCORE_OPT_OUT}</span> ·
        <span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg></span> Creator cancel (assignee, before deadline): <span style="color:var(--warning)">${SCORE_CREATOR_CANCEL_ACTIVE}</span> ·
        <span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg></span> Creator cancel (assignee, after deadline): <span style="color:var(--danger)">${SCORE_FAILED_TO_SUBMIT}</span> ·
        <span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg></span> Expired: <span style="color:var(--danger)">${SCORE_EXPIRE}</span>
      </div>
    </div>
  `;
}

function renderBountyDetail(id) {
  const b = db.bounties.find(x => x.id === id);
  const u = state.currentUser;
  if (!b) return "";

  const isCreator = u.address === b.creator;
  const isContributor = u.address === b.contributor;
  const st = b.status;
  /** Deliverable / execution logs — visible only to the two dispute participants. */
  const canViewPrivateSubmission = isCreator || isContributor;
  const hasSubmission = Boolean(b.workIpfsHash);
  const hasEncryptedSubmission = false;
  const sessionPlain = null;
  const revealed = null;

  // Tracker step states
  const s1 = st >= 0 ? 'done' : '';
  const s2 = st >= 1 ? 'done' : (st === 0 ? 'active' : '');
  const s3 = st >= 2 ? 'done' : (st === 1 ? 'active' : '');
  const isFinal = isSettledStatus(st) || isCancelledStatus(st);
  const isDispPath = st === STATUS_REJECTED || st === STATUS_DISPUTED;
  const s4 = isFinal ? 'done' : (st === STATUS_SUBMITTED ? 'active' : (isDispPath ? 'active' : ''));

  // Dispute window remaining
  const disputeLeft = b.rejectedAt ? timeRemaining(b.rejectedAt + DISPUTE_WINDOW_MS) : '';
  const disputeExpired = Boolean(b.rejectedAt && Date.now() >= b.rejectedAt + DISPUTE_WINDOW_MS);
  // Auto-release remaining
  const autoLeft = b.submittedAt ? timeRemaining(b.submittedAt + AUTO_RELEASE_SILENCE_MS) : '';

  const specRefUrl = (b.specReferenceUrl || "").trim();
  const specRefSafe =
    specRefUrl && /^https?:\/\//i.test(specRefUrl) ? specRefUrl : "";
  const attachedSpecsHtml =
    b.attachedSpecs && b.attachedSpecs.length
      ? b.attachedSpecs
          .map(
            (a) => `
      <details style="margin-bottom:12px; border:1px solid var(--border); border-radius:10px; padding:10px 14px; background:var(--bg-base);">
        <summary style="cursor:pointer; font-weight:600; font-size:14px;">${escapeHtml(a.name || "file")} <span style="font-weight:400; font-size:11px; color:var(--text-secondary);">${escapeHtml(a.mime || "")}</span></summary>
        <pre style="margin-top:12px; font-size:12px; line-height:1.45; max-height:280px; overflow:auto; white-space:pre-wrap; word-break:break-word; color:var(--text-primary);">${escapeHtml(a.content || "")}</pre>
      </details>`,
          )
          .join("")
      : "";

  return `
    <div class="glass-panel">
      <button class="btn btn-secondary" style="padding:6px 12px; margin-bottom:24px; font-size:12px;" onclick="switchTab('browse')">← Back</button>
      
      <div class="flex-between" style="align-items:flex-start; margin-bottom: 32px">
        <div>
          <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 12px;">${b.title}</h1>
          <div class="bounty-meta">
            <span class="badge badge-tag">${b.tag}</span>
            <span>Ref: <span style="font-family:monospace;font-size:11px;">${String(b.id).slice(0, 8)}…</span></span>
            <span>Creator: <span style="font-family:monospace">${escapeHtml(userLabel(getUser(b.creator)))}</span></span>
            <span>Dispute Mode: <span style="color:var(--text-primary)">Auto-generated technical checks</span></span>
            <span style="color:${STATUS_COLOR[st]}">● ${STATUS_LABEL[st]}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; margin-bottom:4px">Bounty Reward</div>
          <div style="font-size: 40px; font-weight: 800; color: var(--success); display:flex; align-items:center; justify-content:flex-end; gap:8px;">
            ${svgAlgo} ${b.reward.toLocaleString()}
          </div>
        </div>
      </div>

      <div style="padding: 24px; background: var(--bg-base); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 32px; font-size:15px; line-height:1.7;">
        ${b.desc || "No description provided."}
      </div>

      ${specRefSafe ? `
      <div style="padding: 18px 20px; background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.35); border-radius: 16px; margin-bottom: 24px;">
        <strong style="color:var(--accent); display:block; margin-bottom:8px; font-size:14px;">External materials</strong>
        <a href="${escapeHtml(specRefSafe)}" target="_blank" rel="noopener noreferrer" style="word-break:break-all; font-size:14px;">${escapeHtml(specRefSafe)}</a>
      </div>
      ` : ""}
      ${attachedSpecsHtml ? `
      <div style="padding: 20px; background: var(--bg-surface); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 24px;">
        <strong style="font-size:15px; display:block; margin-bottom:8px;">Attached specification files</strong>
        <p style="font-size:12px; color:var(--text-secondary); margin:0 0 12px;">Uploaded when the bounty was posted; their contents are mixed into the criteria hash.</p>
        ${attachedSpecsHtml}
      </div>
      ` : ""}

      ${b.testSuiteHash ? `
      <div style="padding: 20px; background: var(--bg-surface); border-radius: 16px; border: 1px dashed rgba(99, 102, 241, 0.4); margin-bottom: 32px; font-size:14px; line-height:1.6;">
        <strong style="color:var(--accent); display:flex; align-items:center; gap:6px; margin-bottom:12px; font-size:16px;"><span class="ico"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span> Verification (commitment)</strong>
        <div style="color:var(--text-secondary); white-space: pre-wrap; font-family: monospace;">SHA-256 hash of test suite (raw text stays on the creator’s device for the oracle).</div>
        <div style="color:var(--text-secondary); white-space: pre-wrap; font-family: monospace; margin-top:8px;">${escapeHtml(b.testSuiteHash)}</div>
      </div>
      ` : ''}

      <!-- TRACKER -->
      <div class="tracker">
        <div class="track-step ${s1}">
          <div class="track-icon">1</div>
          <div class="track-label">Escrowed</div>
        </div>
        <div class="track-step ${s2}">
          <div class="track-icon">2</div>
          <div class="track-label">Accepted</div>
        </div>
        <div class="track-step ${s3}">
          <div class="track-icon">3</div>
          <div class="track-label">Submitted</div>
        </div>
        <div class="track-step ${s4}">
          <div class="track-icon">${isDispPath ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' : (isFinal ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : '4')}</div>
          <div class="track-label">${st === STATUS_REJECTED ? '<span style="color:var(--danger)">Rejected</span>' : st === STATUS_DISPUTED ? '<span style="color:var(--warning)">Disputed</span>' : st === STATUS_OPTED_OUT ? '<span style="color:#9ca3af">Opted Out</span>' : st === STATUS_CANCELLED ? '<span style="color:#a8a29e">Cancelled</span>' : st === STATUS_RESOLVED_CREATOR ? '<span style="color:var(--danger)">Creator Won</span>' : isSettledStatus(st) ? '<span style="color:var(--success)">Settled</span>' : 'Review'}</div>
        </div>
      </div>

      <!-- DELIVERABLE: E2EE (AES-GCM + RSA-OAEP to creator pubkey); legacy cleartext link -->
      ${hasEncryptedSubmission && isCreator ? `
        <div style="padding: 16px; background: rgba(16, 185, 129, 0.08); border: 1px solid var(--success); border-radius: 12px; margin-bottom: 32px;">
          <strong style="color:var(--success);">Encrypted deliverable</strong>
          <p style="margin:10px 0 12px; font-size:13px; color:var(--text-secondary);">Only your browser (where you posted the bounty) holds the RSA private key. Ciphertext is in local data; others see no plaintext.</p>
          ${b.githubContentFrozenHash ? `<div style="font-size:12px; color:var(--success); margin-bottom:8px;">GitHub file <strong>snapshotted at submit</strong> (oracle fails if remote file changes): <span style="font-family:monospace;">${escapeHtml(b.githubContentFrozenHash.slice(0, 20))}…</span></div>` : ""}
          ${b.submissionContentHash ? `<div style="font-size:12px; color:var(--text-secondary); margin-bottom:8px;">Integrity commitment (SHA-256 of plaintext): <span style="font-family:monospace;">${escapeHtml(b.submissionContentHash.slice(0, 24))}…</span></div>` : ""}
          ${!revealed ? `<button type="button" class="btn btn-primary" style="margin-top:4px;" onclick="revealEncryptedSubmission('${b.id}')">Decrypt &amp; view submission</button>` : ""}
          ${revealed ? `<pre style="margin-top:12px; padding:12px; background:rgba(0,0,0,0.35); border-radius:8px; font-size:12px; white-space:pre-wrap; word-break:break-word; max-height:320px; overflow:auto;">${escapeHtml(revealed)}</pre>` : ""}
        </div>
      ` : ""}
      ${hasEncryptedSubmission && isContributor && canViewPrivateSubmission ? `
        <div style="padding: 16px; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--accent); border-radius: 12px; margin-bottom: 32px; font-size: 14px;">
          <strong style="color:var(--accent);">Your submission is end-to-end encrypted</strong> for the creator. The shared database only stores ciphertext.
          ${sessionPlain ? `<pre style="margin-top:10px; padding:12px; background:rgba(0,0,0,0.25); border-radius:8px; font-size:12px; white-space:pre-wrap; max-height:200px; overflow:auto;">Your copy (this tab only):<br/>${escapeHtml(sessionPlain.length > 4000 ? sessionPlain.slice(0, 4000) + "…" : sessionPlain)}</pre>` : `<p style="margin-top:8px; color:var(--text-secondary);">Plaintext preview was cleared (new tab/session). The creator can still decrypt.</p>`}
        </div>
      ` : ""}
      ${hasEncryptedSubmission && !canViewPrivateSubmission ? `
        <div style="padding: 14px 16px; background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.35); border-radius: 12px; margin-bottom: 32px; font-size: 14px; color: var(--text-secondary);">
          <strong style="color:var(--accent);">Confidential submission.</strong> Ciphertext is stored locally; plaintext is only for the creator (RSA) and briefly in the contributor’s session for automated oracle runs.
        </div>
      ` : ""}
      ${!hasEncryptedSubmission && b.workIpfsHash && canViewPrivateSubmission ? `
        <div style="padding: 16px; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); border-radius: 12px; margin-bottom: 32px; color: var(--text-primary);">
          <strong style="color:var(--success); display:flex; align-items:center; gap:6px;"><span class="ico"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></span> Contributor deliverable:</strong>
          <pre style="margin-top:8px; padding:12px; background:rgba(0,0,0,0.2); border-radius:8px; font-family:monospace; white-space:pre-wrap; word-break:break-word; max-height:320px; overflow:auto;">${escapeHtml(b.workIpfsHash)}</pre>
        </div>
      ` : ''}
      ${!hasEncryptedSubmission && b.workIpfsHash && !canViewPrivateSubmission ? `
        <div style="padding: 14px 16px; background: rgba(99, 102, 241, 0.08); border: 1px solid rgba(99, 102, 241, 0.35); border-radius: 12px; margin-bottom: 32px; font-size: 14px; color: var(--text-secondary);">
          <strong style="color:var(--accent);">Private submission.</strong> Visible only to creator and assignee during dispute.
        </div>
      ` : ''}

      <!-- ORACLE LOG OUTPUT -->
      ${b.oracleLog && canViewPrivateSubmission ? `
        <div style="padding: 16px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 32px;">
          <strong style="color:var(--text-secondary); font-size:12px; text-transform:uppercase; letter-spacing:0.5px; display:flex; align-items:center; gap:6px;"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M7.76 7.76 4.93 4.93M21 12h-3M6 12H3M12 21v-3M12 6V3"/></svg></span> Oracle Evaluation Log</strong>
          <pre style="margin-top:8px; padding:12px; background:rgba(0,0,0,0.6); color:#a8b2d1; border-radius:8px; font-family:monospace; font-size:13px; overflow-x:auto; white-space:pre-wrap;">${escapeHtml(b.oracleLog || "No output")}</pre>
        </div>
      ` : ''}

      <!-- AUTO-RELEASE TIMER -->
      ${st === STATUS_SUBMITTED && b.submittedAt && (isCreator || isContributor) ? `
        <div style="padding:12px; background:rgba(99,102,241,0.1); border:1px solid var(--accent); border-radius:12px; margin-bottom:16px; font-size:13px; color:var(--accent);">
          <span style="display:flex;align-items:center;gap:6px;"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg></span><strong>Auto-release timer:</strong></span> If creator doesn't respond, funds auto-release in <strong>${autoLeft}</strong> (5 min demo)
        </div>
      ` : ''}

      <!-- ACTIONS -->
      <div style="display:flex; gap: 16px; flex-wrap:wrap;">

        ${st === STATUS_OPEN && !isCreator && u.role === "contributor" ? `
          <button class="btn btn-primary" onclick="actAccept('${b.id}')">Accept & Begin Work</button>
        ` : ''}

        ${st === STATUS_ACCEPTED && isContributor ? `
          <button class="btn btn-primary" onclick="openSubmitModal('${b.id}')">Submit Completed Work</button>
          <button type="button" class="btn btn-secondary" onclick="actWithdrawAccept('${b.id}')"><span class="ico"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Withdraw (${SCORE_WITHDRAW_ACCEPT} score) — reopen bounty</button>
        ` : ''}

        ${(st === STATUS_OPEN || st === STATUS_ACCEPTED) && isCreator ? `
          <button type="button" class="btn btn-danger" onclick="actCreatorCancel('${b.id}')"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg></span> Cancel bounty &amp; reclaim escrow</button>
        ` : ''}

        ${st === STATUS_SUBMITTED && isCreator ? `
          <button class="btn btn-success" onclick="actApprove('${b.id}')"><span class="ico"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span> Approve Work &amp; Pay ${svgAlgo} ${b.reward}</button>
          <button class="btn btn-danger" onclick="actReject('${b.id}')"><span class="ico"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span> Reject Work</button>
        ` : ''}

        ${st === STATUS_REJECTED && isContributor && !disputeExpired ? `
          <div style="width:100%; padding:16px; background:rgba(239,68,68,0.1); border:1px solid var(--danger); border-radius:12px; margin-bottom:8px; color:var(--text-primary);">
            <strong style="color:var(--danger);">Work Rejected.</strong> During <strong>${disputeLeft}</strong> you can <strong>raise a dispute</strong> (escrow stays locked for automated rules evaluation) or <strong>opt out</strong> (forfeit — funds return to creator, score penalty).
          </div>
          <button class="btn btn-primary" onclick="actDispute('${b.id}')"><span class="ico"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span> Raise Dispute</button>
          <button class="btn btn-secondary" onclick="actOptOut('${b.id}')"><span class="ico"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Opt Out (${SCORE_OPT_OUT} score — refund creator)</button>
        ` : ''}

        ${st === STATUS_REJECTED && isContributor && disputeExpired ? `
          <div style="width:100%; padding:16px; background:rgba(245,158,11,0.1); border:1px solid var(--warning); border-radius:12px; color:var(--text-primary);">
            <strong style="color:var(--warning);">Dispute window ended.</strong> You can no longer dispute or opt out. The creator may reopen this bounty for another contributor if the deadline has not passed.
          </div>
        ` : ''}

        ${st === STATUS_REJECTED && isCreator && !disputeExpired ? `
          <div style="width:100%; padding:16px; background:rgba(239,68,68,0.1); border:1px solid var(--danger); border-radius:12px; color:var(--text-primary);">
            <strong>Work rejected.</strong> Contributor has <strong>${disputeLeft}</strong> to dispute or opt out. You can reopen after that window if they do nothing and the bounty deadline is still in the future (same rules as the contract).
          </div>
        ` : ''}

        ${st === STATUS_REJECTED && isCreator && disputeExpired && Date.now() < b.deadline ? `
          <button class="btn btn-primary" onclick="actReopen('${b.id}')"><span class="ico"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></span> Reopen for another contributor</button>
        ` : ''}

        ${st === STATUS_REJECTED && isCreator && disputeExpired && Date.now() >= b.deadline ? `
          <div style="width:100%; padding:16px; background:rgba(156,163,175,0.15); border:1px solid #9ca3af; border-radius:12px; color:var(--text-secondary);">
            Dispute window ended, but the bounty deadline has passed — reopen is not allowed (matches contract).
          </div>
        ` : ''}

        ${st === STATUS_REJECTED && !isCreator && !isContributor ? `
          <div style="width:100%; padding:16px; background:rgba(239,68,68,0.1); border:1px solid var(--danger); border-radius:12px; color:var(--danger);">
            <strong>Work Rejected.</strong> ${disputeExpired ? "Dispute window ended — creator may reopen if before deadline." : `Waiting for contributor to Dispute or Opt Out (${disputeLeft} remaining).`}
          </div>
        ` : ''}

        ${st === STATUS_DISPUTED ? `
          <div style="width:100%; border-radius:12px; padding:16px; background:rgba(245, 158, 11, 0.1); border:1px solid var(--warning); color:var(--warning); display:flex; flex-direction:column; gap:12px;">
            <div style="display:flex; align-items:center; gap:12px;">
              <span style="animation: pulse 1s infinite" class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M7.76 7.76 4.93 4.93M21 12h-3M6 12H3M12 21v-3M12 6V3"/></svg></span>
              <strong>Oracle Activated:</strong> Evaluating GitHub CI pipeline, bot comment, and final workflow verdict...
            </div>
          </div>
        ` : ''}

        ${isSettledStatus(st) ? `
          <div style="width:100%; color:var(--success); font-weight:700; display:flex; align-items:center; gap:8px; padding:16px; background:rgba(16,185,129,0.1); border:1px solid var(--success); border-radius:12px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            Bounty Completed — Funds Distributed to Contributor
          </div>
        ` : ''}

        ${isCancelledStatus(st) ? `
          <div style="width:100%; padding:16px; background:rgba(156,163,175,0.1); border:1px solid #9ca3af; border-radius:12px; color:#9ca3af;">
            ${st === STATUS_OPTED_OUT
              ? `<span class="ico"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> <strong>Contributor opted out.</strong> Score penalty of ${SCORE_OPT_OUT} applied. Bounty lifecycle ended.`
              : st === STATUS_CANCELLED
              ? `<strong>Creator cancelled the bounty.</strong> Escrow returns to the creator (on-chain: <code style="font-size:11px;">creator_cancel_bounty</code>). If someone had accepted before submit, they were scored down per contract rules.`
              : `<strong>Creator won dispute.</strong> Escrow returned to the creator.`}
          </div>
        ` : ''}

      </div>
    </div>
  `;
}

// Initial render
window.onload = async () => {
  try {
    if (C) {
      C.applyLocalnetAlgod();
    }
  } catch (error) {
    console.warn("Initial LocalNet bootstrap failed", error);
  }
  render();
};

</script>
</body>
</html>
