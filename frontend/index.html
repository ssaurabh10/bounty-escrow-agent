<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="name" content="Bounty Escrow Agent" />
<title>Bounty Escrow Agent | Minimal Ops Desk</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ── CSS Variables & Theming ─────────────────────────── */
  :root[data-theme="dark"] {
    --bg-base: #000000;
    --bg-surface: #080808;
    --bg-surface-hover: #111111;
    --text-primary: #ffffff;
    --text-secondary: #9a9a9a;
    --border: rgba(255, 255, 255, 0.16);
    --accent: #ffffff;
    --accent-hover: #d9d9d9;
    --success: #ffffff;
    --warning: #d0d0d0;
    --danger: #b8b8b8;
    --shadow: 0 18px 60px rgba(0, 0, 0, 0.52);
    --glass-blur: blur(0px);
  }

  :root[data-theme="light"] {
    --bg-base: #ffffff;
    --bg-surface: #f7f7f7;
    --bg-surface-hover: #efefef;
    --text-primary: #000000;
    --text-secondary: #656565;
    --border: rgba(0, 0, 0, 0.16);
    --accent: #000000;
    --accent-hover: #222222;
    --success: #000000;
    --warning: #2f2f2f;
    --danger: #4f4f4f;
    --shadow: 0 16px 42px rgba(0, 0, 0, 0.08);
    --glass-blur: blur(0px);
  }

  /* ── Reset & Typography ──────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; transition: background-color 0.24s ease, color 0.24s ease, border-color 0.24s ease, box-shadow 0.24s ease, opacity 0.24s ease; }
  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
  }
  body.theme-transitioning {
    overflow: hidden;
  }
  
  /* Modern Mesh Gradient Background Overlay */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -2;
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 32%),
      linear-gradient(180deg, rgba(255,255,255,0.02), transparent 28%),
      var(--bg-base);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.35;
    pointer-events: none;
  }
  .theme-transition-layer {
    position: fixed;
    inset: 0;
    z-index: 1200;
    pointer-events: none;
    opacity: 0;
    background:
      linear-gradient(135deg,
        rgba(255,255,255,0.08) 0%,
        rgba(255,255,255,0.18) 35%,
        rgba(255,255,255,0.06) 65%,
        rgba(255,255,255,0) 100%);
    mix-blend-mode: soft-light;
  }
  body.theme-transitioning .theme-transition-layer {
    animation: themeWash 520ms ease-out forwards;
  }
  .app-stage {
    position: relative;
    isolation: isolate;
  }
  body.theme-transitioning .app-stage {
    animation: appSettle 520ms ease-out;
  }
  @keyframes themeWash {
    0% {
      opacity: 0;
      transform: scale(1.015);
    }
    40% {
      opacity: 0.9;
    }
    100% {
      opacity: 0;
      transform: scale(1);
    }
  }
  @keyframes appSettle {
    0% { transform: scale(1) translateY(0); filter: blur(0); }
    50% { transform: scale(0.996) translateY(2px); filter: blur(0.4px); }
    100% { transform: scale(1) translateY(0); filter: blur(0); }
  }

  /* ── Icons ───────────────────────────────────────────── */
  .algo-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 0.72em; height: 0.72em; vertical-align: -0.05em; flex-shrink: 0;
  }
  .algo-icon svg { fill: currentColor; width: 100%; height: 100%; }
  /* Large variant for big reward figures */
  .algo-icon-lg {
    display: inline-flex; align-items: center; justify-content: center;
    width: 0.65em; height: 0.65em; vertical-align: -0.04em; flex-shrink: 0;
  }
  .algo-icon-lg svg { fill: currentColor; width: 100%; height: 100%; }
  /* Mono SVG icon utility — inherits color, sits on the text baseline */
  .ico {
    display: inline-flex; align-items: center; justify-content: center;
    width: 1em; height: 1em; vertical-align: -0.125em; flex-shrink: 0;
  }
  .ico svg { stroke: currentColor; fill: none; width: 100%; height: 100%; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Layout ──────────────────────────────────────────── */
  .container { max-width: 1180px; margin: 0 auto; padding: 28px 22px 56px; position: relative; z-index: 1; }

  /* ── Header ──────────────────────────────────────────── */
  header {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0 0 26px; margin-bottom: 26px; border-bottom: 1px solid var(--border); gap: 18px;
  }
  .brand { font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 12px; letter-spacing: -0.03em; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg-surface); color: var(--text-primary);
    border: 1px solid var(--border); box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  .brand-mark .algo-icon {
    width: 18px; height: 18px;
  }
  .user-badge {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-surface);
    padding: 10px 14px 10px 10px; border-radius: 18px; border: 1px solid var(--border);
    min-width: 0;
    max-width: min(100%, 420px);
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: #111; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 17px;
  }
  .user-info { display: flex; flex-direction: column; font-size: 12px; }
  .user-name {
    font-weight: 700;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.35;
    word-break: break-all;
    overflow-wrap: anywhere;
    text-transform: none;
  }
  .user-meta { color: var(--text-secondary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; }

  /* ── Glassmorphism Panels ────────────────────────────── */
  .glass-panel {
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 55%), var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 28px; margin-bottom: 20px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  /* Profile: allow long wallet addresses to show fully (no clipping) */
  .glass-panel.profile-dash { overflow: visible; }
  .glass-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent 45%);
    pointer-events: none;
  }
  .glass-panel > * { position: relative; z-index: 1; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; gap: 16px; }
  .panel-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -0.03em; }

  /* ── Authentication Overlay ──────────────────────────── */
  .auth-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.62); backdrop-filter: blur(10px);
    display: flex; justify-content: center; align-items: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  }
  .auth-overlay.active { opacity: 1; pointer-events: all; }
  .auth-card {
      background: var(--bg-surface); width: 100%; max-width: 500px;
      border-radius: 28px; padding: 32px; border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transform: translateY(16px); transition: transform 0.3s ease;
    }
  .auth-overlay.active .auth-card { transform: translateY(0); }
  .auth-header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-bottom: 24px;
    }
  .auth-close {
      width: 42px; height: 42px; border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--text-primary); display: inline-flex;
      align-items: center; justify-content: center; cursor: pointer; font-size: 20px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
  .auth-close:hover { background: var(--bg-surface-hover); border-color: var(--text-secondary); }
  
  .auth-tabs { display: flex; gap: 8px; margin-bottom: 28px; background: transparent; border: 1px solid var(--border); padding: 6px; border-radius: 16px; }
  .auth-tab {
    flex: 1; text-align: center; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 13px;
    cursor: pointer; color: var(--text-secondary); transition: all 0.2s;
  }
  .auth-tab.active { background: var(--accent); color: #111; box-shadow: none; }

  /* ── Forms ───────────────────────────────────────────── */
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.12em; }
  .form-control {
    width: 100%; padding: 15px 16px; border-radius: 16px;
    background: rgba(255,255,255,0.02); border: 1px solid var(--border);
    color: var(--text-primary); font-family: 'IBM Plex Mono', monospace; font-size: 14px;
    transition: all 0.2s; outline: none;
  }
  .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.12); }
  select.form-control {
    appearance: none;
    cursor: pointer;
    background-color: var(--bg-surface);
    color: var(--text-primary);
  }
  select.form-control option {
    background: var(--bg-surface);
    color: var(--text-primary);
  }
  textarea.form-control { min-height: 100px; resize: vertical; }

  /* ── Buttons ─────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 20px; border-radius: 16px; font-weight: 700; font-size: 12px;
    cursor: pointer; border: none; outline: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; border: 1px solid var(--border);
  }
  .btn-primary { background: var(--accent); color: var(--bg-base); box-shadow: none; border-color: transparent; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: none; }
  .btn-secondary { background: transparent; color: var(--text-primary); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--bg-surface-hover); border-color: var(--text-secondary); }
  .btn-success { background: var(--success); color: #121212; box-shadow: none; border-color: transparent; }
  .btn-success:hover { filter: brightness(1.05); transform: translateY(-1px); }
  .btn-danger { background: var(--danger); color: #121212; border-color: transparent; }
  .btn-danger:hover { filter: brightness(1.06); transform: translateY(-1px); }
  .btn-full { width: 100%; }
  
  /* ── Tabs (Main App) ─────────────────────────────────── */
  .nav-tabs { display: flex; gap: 10px; margin-bottom: 26px; overflow-x: auto; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav-tab {
    padding: 10px 14px; font-weight: 700; font-size: 12px; color: var(--text-secondary);
    cursor: pointer; position: relative; border: 1px solid var(--border); background: transparent; white-space: nowrap; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .nav-tab.active { color: var(--bg-base); background: var(--accent); border-color: transparent; }
  .nav-tab.active::after {
    content: none;
  }

  /* ── Bounties List ───────────────────────────────────── */
  .bounty-card {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 24px; padding: 22px; margin-bottom: 14px;
    transition: transform 0.22s ease, border-color 0.22s ease, background-color 0.22s ease; cursor: pointer;
    display: flex; justify-content: space-between; align-items: stretch; gap: 18px;
  }
  .bounty-card:hover { border-color: var(--accent); transform: translateY(-2px); background: var(--bg-surface-hover); }
  .bounty-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 12px; color: var(--text-primary); max-width: 32rem; }
  .bounty-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-secondary); align-items: center; flex-wrap: wrap; text-transform: uppercase; letter-spacing: 0.09em; }
  .badge { padding: 5px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; border: 1px solid var(--border); }
  .badge-tag { background: rgba(255,255,255,0.05); color: var(--text-primary); }
  .bounty-reward { min-width: 155px; font-family: 'Space Grotesk', sans-serif; font-size: 38px; font-weight: 700; color: var(--text-primary); display: flex; align-items: flex-end; justify-content: flex-end; gap: 8px; letter-spacing: -0.04em; }

  /* ── Timeline / Tracking ──────────────────────────────── */
  .tracker { display: flex; align-items: center; justify-content: space-between; margin: 36px 0; position: relative; gap: 12px; }
  .tracker::before {
    content: ''; position: absolute; top: 18px; left: 36px; right: 36px; height: 1px;
    background: var(--border); z-index: 0;
  }
  .track-step { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; flex: 1; min-width: 0; }
  .track-icon {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--bg-base); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--text-secondary);
    transition: all 0.24s;
  }
  .track-step.done .track-icon { background: var(--accent); border-color: transparent; color: var(--bg-base); }
  .track-step.active .track-icon { border-color: var(--accent); color: var(--accent); box-shadow: none; }
  .track-label { margin-top: 10px; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; text-align: center; }
  .track-step.done .track-label { color: var(--text-primary); }
  .track-step.active .track-label { color: var(--accent); }

  /* ── Utilities ───────────────────────────────────────── */
  .text-highlight { color: var(--accent); }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .mt-4 { margin-top: 24px; }
  .theme-toggle {
    background: transparent; border: 1px solid var(--border); color: var(--text-primary);
    width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: none; font-size: 16px;
  }
  .theme-toggle:hover { background: var(--bg-surface-hover); }
  .theme-toggle svg {
    width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── Profile dashboard & mission log (structure + motion) ─ */
  @keyframes dashFadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .glass-panel.profile-dash {
    max-width: min(600px, 100%);
    margin-left: auto;
    margin-right: auto;
    text-align: center;
    padding-inline: clamp(18px, 4vw, 28px);
  }
  .profile-dash__avatar {
    width: clamp(72px, 20vw, 96px);
    height: clamp(72px, 20vw, 96px);
    font-size: clamp(28px, 8vw, 40px);
    margin: 0 auto clamp(18px, 4vw, 24px) auto;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #111;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    animation: dashFadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }
  .profile-dash__title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.35rem, 5vw, 2.125rem);
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: -0.04em;
    animation: dashFadeUp 0.52s cubic-bezier(0.22, 1, 0.36, 1) 0.04s forwards;
    opacity: 0;
  }
  .profile-dash__address-wrap {
    width: 100%;
    max-width: 100%;
    margin: 0 0 clamp(18px, 4vw, 28px);
    text-align: left;
    animation: dashFadeUp 0.52s cubic-bezier(0.22, 1, 0.36, 1) 0.08s forwards;
    opacity: 0;
  }
  .profile-dash__address-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .profile-dash__address-full {
    margin: 0;
    padding: 14px 16px;
    font-family: monospace;
    font-size: clamp(11px, 2.6vw, 13px);
    line-height: 1.5;
    word-break: break-all;
    overflow-wrap: anywhere;
    white-space: pre-wrap;
    color: var(--text-primary);
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    user-select: all;
    cursor: text;
  }
  .profile-dash__address-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
    align-items: center;
  }
  .profile-dash__funding {
    margin-top: clamp(18px, 4vw, 24px);
    padding: clamp(14px, 3vw, 16px);
    background: var(--bg-base);
    border-radius: 12px;
    border: 1px solid var(--border);
    text-align: left;
    font-size: clamp(0.72rem, 2.2vw, 0.8125rem);
    color: var(--text-secondary);
    line-height: 1.65;
  }
  .profile-dash__funding strong { color: var(--text-primary); }
  .profile-dash__funding a { color: var(--accent); text-decoration: underline; }
  .profile-dash__stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 148px), 1fr));
    gap: clamp(12px, 3vw, 18px);
    text-align: left;
  }
  .profile-dash__stat {
    background: var(--bg-base);
    padding: clamp(16px, 4vw, 20px);
    border-radius: 16px;
    border: 1px solid var(--border);
    transform-origin: center bottom;
    animation: dashFadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }
  .profile-dash__stat:nth-child(1) { animation-delay: 0.1s; }
  .profile-dash__stat:nth-child(2) { animation-delay: 0.16s; }
  .profile-dash__stat:nth-child(3) { animation-delay: 0.22s; }
  .profile-dash__stat-label {
    color: var(--text-secondary);
    font-size: clamp(0.65rem, 2vw, 0.75rem);
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 8px;
    letter-spacing: 0.06em;
  }
  .profile-dash__stat-value {
    font-size: clamp(1.5rem, 6vw, 2rem);
    font-weight: 800;
    line-height: 1.1;
  }
  .profile-dash__stat-value--algo .algo-bal-unit {
    font-size: 0.42em;
    font-weight: 700;
    margin-left: 0.28em;
    opacity: 0.72;
    letter-spacing: 0.04em;
    vertical-align: 0.12em;
  }
  .profile-dash__stat-sub {
    font-size: clamp(0.8rem, 2.5vw, 0.875rem);
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .profile-dash__rules {
    margin-top: clamp(18px, 4vw, 24px);
    padding: clamp(14px, 3vw, 16px);
    background: var(--bg-base);
    border-radius: 12px;
    border: 1px solid var(--border);
    text-align: left;
    font-size: clamp(0.72rem, 2.2vw, 0.8125rem);
    color: var(--text-secondary);
    line-height: 1.65;
    animation: dashFadeUp 0.58s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    opacity: 0;
    transform-origin: top center;
  }
  .profile-dash__rules strong { color: var(--text-primary); }

  .dashboard-mission .panel-header {
    animation: dashFadeUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }
  .dashboard-mission .bounty-card {
    animation: dashFadeUp 0.48s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }
  /* panel-header is first child; bounty cards start at child 2 */
  .dashboard-mission .bounty-card:nth-child(2) { animation-delay: 0.06s; }
  .dashboard-mission .bounty-card:nth-child(3) { animation-delay: 0.11s; }
  .dashboard-mission .bounty-card:nth-child(4) { animation-delay: 0.16s; }
  .dashboard-mission .bounty-card:nth-child(5) { animation-delay: 0.21s; }
  .dashboard-mission .bounty-card:nth-child(6) { animation-delay: 0.26s; }
  .dashboard-mission .bounty-card:nth-child(n+7) { animation-delay: 0.3s; }
  .dashboard-empty {
    text-align: center;
    padding: clamp(40px, 12vw, 64px) clamp(16px, 5vw, 24px);
    animation: dashFadeUp 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }
  .dashboard-empty h3 { margin-bottom: 16px; font-size: clamp(1.1rem, 3.5vw, 1.25rem); }
  .dashboard-empty p {
    color: var(--text-secondary);
    margin-bottom: clamp(18px, 4vw, 24px);
    font-size: clamp(0.8rem, 2.5vw, 0.9rem);
    max-width: 32ch;
    margin-left: auto;
    margin-right: auto;
  }

  @media (prefers-reduced-motion: reduce) {
    .profile-dash__avatar,
    .profile-dash__title,
    .profile-dash__address,

  if (!db.bounties.some((bounty) => bounty.id === sample.id)) {
    db.bounties.push(sample);
  }
}

  if (!u || !u.address) continue;
  const n = (u.name || "").trim();
  if (n.includes("…") || n.includes("...")) u.name = "";
}
saveDB();

function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function getUser(addr) { return db.users[addr]; }
/** Label for UI: human alias if set, otherwise full wallet address (never middle-ellipsis). */
function userLabel(u) {
  if (!u) return "Unknown";
  const addr = (u.address || "").trim();
  const alias = (u.name || "").trim();
  if (alias && alias !== addr) return alias;
  return addr || alias || "Unknown";
}

function collectPrefixedStorage(prefix) {
  const out = {};
  for (let i = 0; i < localStorage.length; i += 1) {
    const key = localStorage.key(i);
    if (key && key.startsWith(prefix)) {
      out[key] = localStorage.getItem(key);
    }
  }
  return out;
}

function buildLocalBackupPayload() {
  return {
    version: 1,
    exportedAt: new Date().toISOString(),
    db,
    oracleTests: collectPrefixedStorage(BE_TESTS_PREFIX),
  };
}

function downloadLocalBackup() {
  try {
    const payload = buildLocalBackupPayload();
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().replace(/[:.]/g, "-");
    a.href = url;
    a.download = `bounty-escrow-backup-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (error) {
    alert("Could not create backup: " + (error?.message || error));
  }
}

function triggerBackupImport() {
  const input = document.getElementById("backupImportInput");
  if (input) input.click();
}

async function handleBackupImport(e) {
  const file = e?.target?.files?.[0];
  if (!file) return;
  try {
    const raw = await file.text();
    const payload = JSON.parse(raw);
    if (!payload || typeof payload !== "object" || !payload.db || !payload.db.users) {
      throw new Error("Backup file is missing the expected bounty database payload.");
    }

    db = payload.db;

async function hashText(text) {
  const hashBuffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text || ""));
  return Array.from(new Uint8Array(hashBuffer))
    .map((byte) => byte.toString(16).padStart(2, "0"))
    .join("");
}

/** File extensions we treat as single-file source links for GitHub raw fetch. */
const GITHUB_SOURCE_EXTS = [".c", ".cpp", ".js", ".ts", ".go", ".rs", ".py"];

function normalizeGithubRawUrl(urlString) {
  let u = urlString.trim();
  if (u.includes("github.com") && !u.includes("raw.githubusercontent.com")) {
    u = u.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/");
  }
  return u;
}

function isGithubSourceDeliverableUrl(text) {
  const t = (text || "").trim();
  return (
    /^https?:\/\//i.test(t) &&
    (t.includes("github.com") || t.includes("raw.githubusercontent.com")) &&
    GITHUB_SOURCE_EXTS.some((ext) => t.endsWith(ext))
  );
}

/** True if URL ref is probably a branch/tag, not a commit SHA (mutable). */
function githubUrlLooksMutableRef(urlString) {
  try {
    const u = new URL(urlString.trim());
    const path = u.pathname;
    if (path.includes("/blob/")) {
      const rest = path.split("/blob/")[1] || "";
      const segs = rest.split("/").filter(Boolean);
      const ref = segs[0];
      if (ref && /^[a-f0-9]{7,40}$/i.test(ref)) return false;
      return true;
    }
    if (u.hostname === "raw.githubusercontent.com") {
      const parts = path.split("/").filter(Boolean);
      if (parts.length >= 3 && /^[a-f0-9]{7,40}$/i.test(parts[2])) return false;
      return true;
    }
    return true;
  } catch {
    return true;
  }
}

/** Fetch raw file bytes as text and hash — freezes “what was at this URL at submit time”. */
async function tryFreezeGithubContent(urlString) {
  const rawUrl = normalizeGithubRawUrl(urlString);
  const res = await fetch(rawUrl);
  if (!res.ok) {
    throw new Error(`HTTP ${res.status} fetching ${rawUrl}`);
  }
  const text = await res.text();
  const contentHash = await hashText(text);
  return { rawUrl, contentHash, byteLength: text.length };
}

async function tryBindLocalnetSignerForUser(user) {
  if (!user) return null;
  const client = requireAlgoClient();
  client.applyLocalnetAlgod();
  state.networkMode = "localnet";

  try {
    const accounts = await client.getKMDAccounts();
    if (!accounts?.length) return null;

    let targetAddress = normalizeAlgorandAddress(user.address);

    if (!isValidAlgorandAddress(targetAddress)) {
      let deployInfo = null;
      try {
        deployInfo = await fetchDeployInfo();
      } catch {}

      const roleKey =
        user.role === "creator" ? "creator" :
        user.role === "contributor" ? "worker" :
        user.role === "oracle" ? "oracle" :
        null;

      targetAddress =
        normalizeAlgorandAddress((roleKey && deployInfo?.accounts?.[roleKey]) || "") ||
        (roleKey === "creator" ? accounts[0]?.address :
         roleKey === "worker" ? accounts[1]?.address :
         roleKey === "oracle" ? accounts[2]?.address :
         accounts[0]?.address) ||
        "";

      if (targetAddress) {
        const remapped = upsertWalletUser({
          address: targetAddress,
          role: user.role,
          name: user.name,
          password: user.password,
        });
        for (const key of Object.keys(db.users)) {
          if (key !== targetAddress && db.users[key]?.name === user.name && db.users[key]?.password === user.password) {
            delete db.users[key];
          }
        }
        saveDB();
        user = remapped;
      }
    }

    const account = accounts.find((entry) => entry.address === targetAddress);
    if (!account) return user;

    state.currentSigner = client.wrapKmdAccount(account);
    if (user.address !== targetAddress) {
      user = upsertWalletUser({
        address: targetAddress,
        role: user.role,
        name: user.name,
        password: user.password,
      });
      saveDB();
    }
    return user;
  } catch (error) {
    console.warn("LocalNet signer auto-bind failed", error);
    return user;
  }
}

async function readUploadedTextFile(file) {
  if (!file) return "";
  const text = await file.text();
  return text || "";

function tokenizeForSimilarity(text) {
  return (text || "")
    .toLowerCase()
    .replace(/<script[\s\S]*?<\/script>/gi, " ")
    .replace(/<style[\s\S]*?<\/style>/gi, " ")
    .replace(/<[^>]+>/g, " ")
    .replace(/[^a-z0-9]+/g, " ")
    .split(/\s+/)
    .filter((token) => token.length >= 3);
}

function uniqueOrderedMatches(sourceTokens, targetSet) {
  const out = [];
  const seen = new Set();
  for (const token of sourceTokens) {
    if (targetSet.has(token) && !seen.has(token)) {
      seen.add(token);
      out.push(token);
    }
  }
  return out;
}

function scoreFrontendPlagiarism(referenceText, submittedText) {
  const refTokens = tokenizeForSimilarity(referenceText);
  const subTokens = tokenizeForSimilarity(submittedText);
  const refSet = new Set(refTokens);
  const subSet = new Set(subTokens);
  const overlap = uniqueOrderedMatches(refTokens, subSet);
  const overlapRatio =
    refSet.size > 0 ? overlap.length / Math.max(refSet.size, 1) : 0;

  const headingMatches = [
    "admission",
    "academics",
    "departments",
    "campus",
    "placements",
    "notices",
    "about",
    "contact",
  ].filter((token) => refSet.has(token) && subSet.has(token));

  const structureSignals = [
    /hero/i.test(referenceText) && /hero/i.test(submittedText),
    /placement/i.test(referenceText) && /placement/i.test(submittedText),
    /department/i.test(referenceText) && /department/i.test(submittedText),
    /notice/i.test(referenceText) && /notice/i.test(submittedText),
  ].filter(Boolean).length;

  let score = 0;
  if (overlapRatio >= 0.7) score += 4;
  else if (overlapRatio >= 0.5) score += 3;
  else if (overlapRatio >= 0.35) score += 2;
  else if (overlapRatio >= 0.2) score += 1;

  if (headingMatches.length >= 5) score += 2;
  else if (headingMatches.length >= 3) score += 1;

  if (structureSignals >= 3) score += 2;
  else if (structureSignals >= 2) score += 1;

  let verdict = "PASS";
  if (score >= 7) verdict = "FAIL";
  else if (score >= 4) verdict = "REVIEW";

  return {
    verdict,
    score,
    overlapRatio,
    overlapCount: overlap.length,
    uniqueReferenceTokens: refSet.size,
    uniqueSubmittedTokens: subSet.size,
    headingMatches,
    overlapSample: overlap.slice(0, 18),
  };
}

async function handleFrontendPlagiarismCheck(e) {
  e.preventDefault();
  const refFile = e.target.referenceFile.files?.[0];
  const submittedFile = e.target.submittedFile.files?.[0];
  if (!refFile || !submittedFile) {
    alert("Upload both the reference frontend file and the submitted frontend file.");
    return;
  }

  const allowed = [".html", ".htm", ".css", ".js", ".jsx", ".ts", ".tsx", ".txt"];
  const refName = refFile.name.toLowerCase();
  const submittedName = submittedFile.name.toLowerCase();
  if (!allowed.some((ext) => refName.endsWith(ext)) || !allowed.some((ext) => submittedName.endsWith(ext))) {
    alert("Frontend plagiarism check currently supports HTML, CSS, JS, TS, JSX, TSX, and TXT files only.");
    return;
  }

  state.plagiarismLoading = true;
  state.plagiarismResult = null;
  render();

  try {
    const [referenceText, submittedText] = await Promise.all([
      readUploadedTextFile(refFile),
      readUploadedTextFile(submittedFile),
    ]);

    const analysis = scoreFrontendPlagiarism(referenceText, submittedText);
    state.plagiarismResult = {
      domain: "Frontend / Website",
      referenceName: refFile.name,
      submittedName: submittedFile.name,
      checkedAt: Date.now(),
      ...analysis,
    };
  } catch (error) {
    alert("Could not run plagiarism check: " + (error?.message || error));
  } finally {
    state.plagiarismLoading = false;
    render();
  }
}

const MAX_BOUNTY_ATTACH_BYTES = 120 * 1024; // per file
const MAX_BOUNTY_ATTACH_TOTAL = 400 * 1024;
const MAX_BOUNTY_ATTACH_COUNT = 6;

async function readBountyAttachmentFiles(fileList) {
  const arr = Array.from(fileList || []).filter((f) => f && f.size > 0).slice(0, MAX_BOUNTY_ATTACH_COUNT);
  const out = [];
  let total = 0;
  for (const f of arr) {
    if (f.size > MAX_BOUNTY_ATTACH_BYTES) {
      throw new Error(
        `“${f.name}” is too large (max ${Math.round(MAX_BOUNTY_ATTACH_BYTES / 1024)} KB per file). Use an external link for big assets.`,
      );
    }
    total += f.size;
    if (total > MAX_BOUNTY_ATTACH_TOTAL) {
      throw new Error(`Attachments exceed ${Math.round(MAX_BOUNTY_ATTACH_TOTAL / 1024)} KB total. Link to a drive/repo instead.`);
    }
    const text = await f.text();
    out.push({
      name: f.name,
      mime: f.type || "text/plain",
      content: text,
    });
  }
  return out;
}

// 1. post_bounty — real on-chain call via connected signer
async function postBounty(e) {
  e.preventDefault();
  try {
    const client = requireAlgoClient();
    if (!state.currentUser) throw new Error("Sign in with a wallet first.");
    if (state.currentUser.role !== "creator") throw new Error("Only creator wallets can post a bounty.");
    if (
      !state.currentSigner?.address ||
      !isValidAlgorandAddress(state.currentSigner.address) ||
      state.currentSigner.address !== state.currentUser.address
    ) {
      state.currentUser = await tryBindLocalnetSignerForUser(state.currentUser);
    }
    if (state.currentSigner?.address && state.currentUser?.address !== state.currentSigner.address) {
      state.currentUser = upsertWalletUser({
        address: state.currentSigner.address,
        role: state.currentUser?.role || "creator",
        name: state.currentUser?.name || "LocalNet User",
        password: state.currentUser?.password || "demo",
      });
      saveDB();
    }
    if (
      !state.currentSigner?.address ||
      !isValidAlgorandAddress(state.currentSigner.address) ||
      state.currentSigner.address !== state.currentUser.address
    ) {
      throw new Error("Connect the creator wallet from Sign In / Connect before posting.");
    }
    const reward = parseFloat(e.target.reward.value);
    const rewardMicroAlgos = Math.round(reward * 1_000_000);
    if (!Number.isFinite(reward) || reward <= 0) {
      throw new Error("Reward must be a positive ALGO amount.");
    }
    if (!Number.isFinite(rewardMicroAlgos) || rewardMicroAlgos <= 0) {
      throw new Error("Reward is too small after conversion to microAlgos.");
    }
    const days = parseInt(e.target.days.value, 10);
    if (!Number.isFinite(days) || days <= 0) {
      throw new Error("Deadline must be at least 1 day.");
    }
    const deadlineMs = Date.now() + days * 86400000;
    const desc = e.target.desc.value;
    const testCases = ((e.target.testCases && e.target.testCases.value) || "").trim();
    const specReferenceUrl = (e.target.specReferenceUrl && e.target.specReferenceUrl.value.trim()) || "";
    const attachedSpecs = await readBountyAttachmentFiles(e.target.bountyAttachments && e.target.bountyAttachments.files);
    const attachmentFingerprint = attachedSpecs.map((a) => `${a.name}\0${a.content}`).join("\0\0");
    const criteriaHash = await hashText(
      [desc, specReferenceUrl || "", attachmentFingerprint || ""].join("\n---BOUNTY_CRITERIA---\n"),
    );
    const testSuiteHash = await hashText(testCases || "");

    state.networkMode = "localnet";
    const localId = `local-${Date.now()}-${Math.floor(Math.random() * 100000)}`;

    const bounty = {
      id: localId,
      onChain: false,
      txId: null,
      createdAt: Date.now(),
      title: e.target.title.value,
      desc,
      specReferenceUrl: specReferenceUrl || null,
      attachedSpecs: attachedSpecs.length ? attachedSpecs : null,
      reward,
      deadline: deadlineMs,
      creator: state.currentUser.address,
      status: STATUS_OPEN,
      tag: e.target.tag.value,
      minTier: e.target.minTier.value,
      contributor: null,
      criteriaHash,
      testSuiteHash,
      disputeMode: "auto_generated_rules",
      workIpfsHash: null,
      acceptedAt: null,
      submittedAt: null,
      rejectedAt: null,
      disputedAt: null,
      resolvedAt: null,
      deliverableEncrypted: null,
    };

    if (testCases && testCases.trim()) {
      localStorage.setItem(BE_TESTS_PREFIX + bounty.id, testCases);
    }

    upsertBountyRecord(bounty);
    saveDB();
    state.activeTab = "browse";
    render();
    alert("Bounty posted.");
  } catch (error) {
    console.error(error);
    alert(`Post bounty failed: ${String(error?.message || error)}`);
  }
}

async function handleSubmitWork(e) {
  e.preventDefault();
  const id = state.submitBountyId;
  const body = (e.target.submissionBody && e.target.submissionBody.value) || (e.target.ipfsHash && e.target.ipfsHash.value) || "";
  const githubToken = String(e.target.githubToken?.value || "").trim();
  if (githubToken) {
    localStorage.setItem("be_github_token", githubToken);
  }
  const plaintext = body.trim();
  const b = db.bounties.find((x) => x.id === id);
  if (!b || b.status !== STATUS_ACCEPTED) return;
  if (!state.currentUser || state.currentUser.address !== b.contributor) return;
  if (!plaintext || plaintext.length < 10) {
    alert("Submission must be at least 10 characters (URL, CID, or pasted source).");
    return;
  }

  try {
    let githubContentFrozenHash = null;
    if (isGithubSourceDeliverableUrl(plaintext)) {
      if (githubUrlLooksMutableRef(plaintext)) {
        const pin = confirm(
          "This GitHub link uses a branch name (e.g. main), so the file can change later.\n\n" +
            "Prefer a raw URL with a commit SHA:\n" +
            "https://raw.githubusercontent.com/owner/repo/<40-char-commit>/path/file.ext\n\n" +
            "OK = still submit (we will snapshot current content). Cancel = edit the URL.",
        );
        if (!pin) return;
      }
      try {
        const snap = await tryFreezeGithubContent(plaintext);
        githubContentFrozenHash = snap.contentHash;
      } catch (err) {
        const msg = String(err?.message || err);
        if (
          !confirm(
            "Could not snapshot GitHub file for tamper detection:\n" +
              msg +
              "\n\nSubmit anyway? (Oracle will not detect if the file changes later.)",
          )
        ) {
          return;
        }
      }
    }

    const submissionHash = await hashText(plaintext);
    b.submissionContentHash = submissionHash;
    b.githubContentFrozenHash = githubContentFrozenHash || null;
    b.workIpfsHash = plaintext;
    b.status = STATUS_SUBMITTED;
    b.submittedAt = Date.now();
    b.resolvedAt = null;
    upsertBountyRecord(b);
    saveDB();
    startAutoReleaseTimer(id);
    state.submitModalOpen = false;
    state.submitBountyId = null;
    render();
  } catch (err) {
    console.error(err);
    alert(`Submission failed: ${err?.message || err}`);
  }

// 10. oracle_verdict — GitHub CI based verification

async function fetchWithTimeout(url, init = {}, timeoutMs = 20000) {
  const controller = new AbortController();
  const t = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, { ...init, signal: controller.signal });
  } finally {
    clearTimeout(t);
  }
}

function parseGithubReference(urlText) {
  const value = String(urlText || "").trim();
  try {
    const u = new URL(value);
    const host = u.hostname.toLowerCase();
    if (host !== "github.com" && host !== "www.github.com") return null;
    const parts = u.pathname.split("/").filter(Boolean);
    if (parts.length < 2) return null;
    const owner = parts[0];
    const repo = parts[1].replace(/\.git$/i, "");
    const prIndex = parts.findIndex((p) => p === "pull");
    const prNumber = prIndex >= 0 ? Number(parts[prIndex + 1] || 0) : null;
    return {
      owner,
      repo,
      prNumber: Number.isFinite(prNumber) && prNumber > 0 ? prNumber : null,
      url: value,
    };
  } catch {
    return null;
  }
}

function githubHeaders() {
  const token = String(localStorage.getItem("be_github_token") || window.BE_GITHUB_TOKEN || "").trim();
  return token
    ? { Accept: "application/vnd.github+json", Authorization: `Bearer ${token}` }
    : { Accept: "application/vnd.github+json" };
}

function hasGithubToken() {
  return Boolean(String(localStorage.getItem("be_github_token") || window.BE_GITHUB_TOKEN || "").trim());
}

async function fetchGitHubJson(url) {
  const res = await fetchWithTimeout(url, { headers: githubHeaders() }, 20000);
  if (!res.ok) {
    let body = "";
    try { body = await res.text(); } catch {}
    const err = new Error(`GitHub API ${res.status} for ${url}${body ? `: ${body.substring(0, 180)}` : ""}`);
    err.status = res.status;
    err.responseBody = body;
    throw err;
  }
  return await res.json();
}

async function fetchWorkflowYaml(owner, repo) {
  const decodeContent = (content, pathHint) => {
    const encoded = String(content?.content || "").replace(/\n/g, "");
    if (!encoded) throw new Error(`Missing content for workflow file: ${pathHint}`);
    try {
      return atob(encoded);
    } catch {
      throw new Error(`Unable to decode workflow YAML from GitHub for ${pathHint}.`);
    }
  };

  const candidates = [
    ".github/workflows/code_check.yml",
    ".github/workflows/code-check.yml",
    ".github/workflows/ci.yml",
    ".github/workflows/ci.yaml",
  ];
  let saw404 = false;
  for (const path of candidates) {
    try {
      const content = await fetchGitHubJson(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
      return decodeContent(content, path);
    } catch (err) {
      if (err?.status === 404) {
        saw404 = true;
        continue;
      }
      throw err;
    }
  }

  try {
    const workflows = await fetchGitHubJson(`https://api.github.com/repos/${owner}/${repo}/actions/workflows?per_page=100`);
    const items = Array.isArray(workflows?.workflows) ? workflows.workflows : [];
    const chosen =
      items.find((wf) => {
        const name = String(wf?.name || "").toLowerCase();
        const path = String(wf?.path || "").toLowerCase();
        return (
          name.includes("code quality check") ||
          path.includes("code_check") ||
          path.includes("code-check") ||
          path.includes("/ci.")
        );
      }) || items[0];

    if (!chosen?.path) throw new Error("No workflow files discovered by GitHub Actions API.");
    const normalized = String(chosen.path || "").replace(/^\/+/, "");
    const content = await fetchGitHubJson(`https://api.github.com/repos/${owner}/${repo}/contents/${normalized}`);
    return decodeContent(content, normalized);
  } catch (err) {
    if (err?.status === 404 && (saw404 || !hasGithubToken())) {
      throw new Error(
        `Workflow file not accessible for ${owner}/${repo}. ` +
        `If the repo is private, provide a GitHub token with repo/actions read access (stored as local key 'be_github_token').`,
      );
    }
    throw err;
  }
}

function workflowHasRequiredChecks(yamlText) {
  const yaml = String(yamlText || "").toLowerCase();
  const requiredSnippets = [
    "flake8",
    "pylint",
    "mypy",
    "security_reality_check.py",
    "generate_ai_tests.py",
    "github-script",
    "createcomment",
  ];
  const missing = requiredSnippets.filter((snippet) => !yaml.includes(snippet));
  return { ok: missing.length === 0, missing };
}

async function fetchLatestCodeCheckRun(owner, repo) {
  try {
    for (const wfFile of ["code_check.yml", "code-check.yml"]) {
      try {
        const byWorkflow = await fetchGitHubJson(
          `https://api.github.com/repos/${owner}/${repo}/actions/workflows/${wfFile}/runs?per_page=10`,
        );
        const runs = Array.isArray(byWorkflow?.workflow_runs) ? byWorkflow.workflow_runs : [];
        if (runs.length) return runs[0];
      } catch {}
    }
  } catch {}

  const all = await fetchGitHubJson(`https://api.github.com/repos/${owner}/${repo}/actions/runs?per_page=20`);
  const runs = (Array.isArray(all?.workflow_runs) ? all.workflow_runs : []).filter((run) => {
    const name = String(run?.name || "").toLowerCase();
    const path = String(run?.path || "").toLowerCase();
    return name.includes("code quality check") || path.includes("code_check.yml");
  });
  if (!runs.length) return null;
  return runs[0];
}

async function fetchPrHasBotVerdictComment(owner, repo, prNumber) {
  if (!prNumber) return false;
  const comments = await fetchGitHubJson(
    `https://api.github.com/repos/${owner}/${repo}/issues/${prNumber}/comments?per_page=100`,
  );
  const arr = Array.isArray(comments) ? comments : [];
  return arr.some((comment) => String(comment?.body || "").toLowerCase().includes("ci bot verdict"));
}

async function simulateOracle(id) {
  const b = db.bounties.find((x) => x.id === id);
  if (!b || b.status !== STATUS_DISPUTED) return;

  const work = getOraclePlaintext(b).trim();
  if (!work) {
    await finalizeOracle(
      b,
      false,
      "Oracle FAIL - Confidential mode: submission plaintext exists only in the contributor's browser session. Raise the dispute from the same session right after submitting so the oracle can verify it.",
    );
    return;
  }

  const gh = parseGithubReference(work);
  if (!gh) {
    await finalizeOracle(
      b,
      false,
      "Oracle FAIL - Submit a GitHub repository URL (or PR URL) so CI pipeline verdict can be verified.",
    );
    return;
  }

  try {
    const yaml = await fetchWorkflowYaml(gh.owner, gh.repo);
    const checkCoverage = workflowHasRequiredChecks(yaml);
    if (!checkCoverage.ok) {
      await finalizeOracle(
        b,
        false,
        `Oracle FAIL - GitHub workflow is missing required CI checks: ${checkCoverage.missing.join(", ")}`,
      );
      return;
    }

    const latestRun = await fetchLatestCodeCheckRun(gh.owner, gh.repo);
    if (!latestRun) {
      await finalizeOracle(
        b,
        false,
        "Oracle FAIL - No Code Quality Check workflow run found on GitHub.",
      );
      return;
    }

    if (String(latestRun.status || "").toLowerCase() !== "completed") {
      await finalizeOracle(
        b,
        false,
        "Oracle FAIL - Latest Code Quality Check run is still in progress. Wait for completion.",
      );
      return;
    }

    const runPass = String(latestRun.conclusion || "").toLowerCase() === "success";
    let hasBotComment = false;
    try {
      hasBotComment = await fetchPrHasBotVerdictComment(gh.owner, gh.repo, gh.prNumber);
    } catch {
      hasBotComment = false;
    }

    const devWins = runPass && (!gh.prNumber || hasBotComment);
    const runName = latestRun.name || "Code Quality Check";
    const runId = latestRun.id || "unknown";
    const runConclusion = latestRun.conclusion || "unknown";
    const msg = devWins
      ? `Oracle PASS - ${runName} succeeded on GitHub CI (run ${runId}), required checks configured, and bot verdict comment present.`
      : `Oracle FAIL - GitHub CI verdict not acceptable. Run conclusion: ${runConclusion}.` +
        (gh.prNumber && !hasBotComment ? " Missing CI bot verdict PR comment." : "");

    b.oracleLog =
      `repo=${gh.owner}/${gh.repo}\n` +
      `run_id=${runId}\n` +
      `run_status=${latestRun.status}\n` +
      `run_conclusion=${runConclusion}\n` +
      `required_checks_ok=${checkCoverage.ok}\n` +
      `bot_comment_found=${hasBotComment}`;
    await finalizeOracle(b, devWins, msg);
  } catch (err) {
    await finalizeOracle(b, false, "Oracle FAIL - Exception during execution: " + err.message);
  }
}

async function finalizeOracle(b, devWins, alertMsg) {
  if (devWins) {
    b.status = STATUS_RESOLVED_WORKER;
    applyScoreDelta(b.contributor, SCORE_DISPUTE_WIN);
  } else {
    b.status = STATUS_RESOLVED_CREATOR;
    applyScoreDelta(b.contributor, SCORE_DISPUTE_LOSS);
  }
  b.resolvedAt = Date.now();
  upsertBountyRecord(b);
  saveDB();
  await refreshCreditScore(b.contributor);
  render();
  alert(alertMsg);
}

/* Helper for remaining time display */
function timeRemaining(targetMs) {
  const diff = targetMs - Date.now();
  if (diff <= 0) return "Expired";
  const s = Math.floor(diff/1000);
  const m = Math.floor(s/60);
  return m > 0 ? `${m}m ${s%60}s` : `${s}s`;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function copyProfileAddress() {
  const el = document.getElementById("profileWalletAddress");
  const text = el ? el.textContent.trim() : "";
  if (!text) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      alert("Wallet address copied to clipboard.");
    }).catch(() => {
      prompt("Copy this address:", text);
    });
  } else {
    prompt("Copy this address:", text);
  }
}

/* Use 127.0.0.1 (not "localhost") so Windows does not hit ::1 while the API listens on IPv4. */
const LOCALNET_WALLET_API = "http://127.0.0.1:3457";

/** Normalize JSON from /balance: always microAlgos (algod `amount`). */
function parseMicroAlgosFromBalanceResponse(data) {
  if (!data || typeof data !== "object") return null;
  const pick = (v) => {
    if (v == null || v === "") return null;
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
  };
  const direct =
    pick(data.microalgos) ?? pick(data.microAlgos) ?? pick(data.amount);
  if (direct != null) return direct;
  const alg = pick(data.algos);
  if (alg == null) return null;
  /* If "algos" holds a huge integer, it is almost always microAlgos with the wrong key. */
  if (Number.isInteger(alg) && alg >= 1_000_000) return Math.round(alg);
  return Math.round(alg * 1_000_000);
}

/** Whole ALGO for display (microAlgos / 1e6). */
function formatAlgosFromMicro(micro) {
  const m = Number(micro);
  if (!Number.isFinite(m)) return null;
  const algos = m / 1_000_000;
  return algos.toLocaleString(undefined, { maximumFractionDigits: 6, minimumFractionDigits: 0 });
}

/** Standard Algorand public address (base32), not demo placeholders like ALGO...EX1 */
function isLikelyAlgorandAddress(addr) {
  const s = typeof addr === "string" ? addr.trim() : "";
  return /^[A-Z2-7]{58}$/.test(s);
}

async function refreshAlgoBalance() {
  const addr = state.currentUser?.address;
  if (!addr || !isLikelyAlgorandAddress(addr)) {
    state.algoBalanceMicro = null;
    state.algoBalanceLoading = false;
    state.algoBalanceError = null;
    render();
    return;
  }
  state.algoBalanceLoading = true;
  state.algoBalanceError = null;
  render();
  try {
    const res = await fetch(
      `${LOCALNET_WALLET_API}/balance?address=${encodeURIComponent(addr)}`,
      { method: "GET" },
    );
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    const micro = parseMicroAlgosFromBalanceResponse(data);
    state.algoBalanceMicro = micro != null ? micro : null;
    state.algoBalanceError = null;
  } catch (e) {
    state.algoBalanceMicro = null;
    state.algoBalanceError = String(e?.message || e);
  } finally {
    state.algoBalanceLoading = false;
    render();
  }
}

async function loadLocalNetAccounts() {
  if (state.localnetLoading) return;
  state.localnetLoading = true;
  render();
  try {
    const res = await fetch(`${LOCALNET_WALLET_API}/accounts`, { method: "GET" });
    if (!res.ok) throw new Error(`Wallet API HTTP ${res.status}`);
    const data = await res.json();
    state.localnetAccounts = (data.accounts || []).map((a) => a.address).filter(Boolean);
  } catch (e) {
    alert(
      "Cannot reach LocalNet Wallet API.\n\n" +
      "Fix:\n" +
      "1) LocalNet: algokit localnet start\n" +
      "2) Run: python oracle/localnet_wallet_api.py\n" +
      "3) In the browser open: http://127.0.0.1:3457/health\n" +
      "   (use 127.0.0.1 — on Windows, “localhost” can use IPv6 and miss this server.)\n\n" +
      "Details: " + (e?.message || e)
    );
  } finally {
    state.localnetLoading = false;
    render();
  }
}

function setCurrentUserAddress(addr) {
  if (!state.currentUser) return;
  if (!addr) return;
  const prev = state.currentUser;
  const existing = db.users[addr];
  if (!existing) {
    const pn = (prev.name || "").trim();
    const cleanPrevName = pn.includes("…") || pn.includes("...") ? "" : pn;
    db.users[addr] = { ...prev, address: addr, name: cleanPrevName && cleanPrevName !== addr ? cleanPrevName : "" };
  } else {
    let nm = (existing.name || "").trim();
    if (nm.includes("…") || nm.includes("...")) nm = "";
    db.users[addr] = { ...existing, name: nm, role: existing.role || prev.role, address: addr };
  }
  saveDB();
  state.currentUser = db.users[addr];
  state.algoBalanceMicro = null;
  state.algoBalanceError = null;
  render();
  refreshAlgoBalance();
}

async function fundLocalNet(address, microalgos) {
  if (!address) return;
  try {
    const res = await fetch(`${LOCALNET_WALLET_API}/fund`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ address, microalgos }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    if (String(data.receiver || "") === String(state.currentUser?.address || "")) {
      state.algoBalanceMicro =
        data.receiver_balance != null ? Number(data.receiver_balance) : state.algoBalanceMicro;
      state.algoBalanceError = null;
      render();
    }
    const rb = data.receiver_balance != null ? Number(data.receiver_balance) : NaN;
    const balAlgo = Number.isFinite(rb) ? formatAlgosFromMicro(rb) : null;
    alert(
      `Funded!\nTxID: ${data.txid}\nNew balance: ` +
        (balAlgo != null ? `${balAlgo} ALGO` : String(data.receiver_balance)),
    );
  } catch (e) {
    alert(
      "Funding failed.\n\n" +
      "Make sure:\n" +
      "- LocalNet is running\n" +
      "- python oracle/localnet_wallet_api.py is running\n" +
      "- Check http://127.0.0.1:3457/health (algod_reachable / kmd_reachable)\n\n" +
      "Details: " + (e?.message || e)
    );
  }
}

function formatEventDate(ts) {
  if (!ts || !Number.isFinite(Number(ts))) return "—";
  return new Date(Number(ts)).toLocaleString([], {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
  });
}

function getActiveUserBounties(user) {
  if (!user) return [];
  return db.bounties.filter((b) => {
    const isParticipant = b.creator === user.address || b.contributor === user.address;
    return isParticipant && !isSettledStatus(b.status) && !isCancelledStatus(b.status);
  });
}

function getTransactionAmountLabel(entry) {
  const sign = entry.direction === "in" ? "+" : entry.direction === "out" ? "-" : "·";
  return `${sign} ${svgAlgo} ${Number(entry.amount || 0).toLocaleString()}`;
}

function buildTransactionHistory(user) {
  if (!user) return [];
  const entries = [];
  const participantBounties = db.bounties.filter(
    (b) => b.creator === user.address || b.contributor === user.address,
  );

  for (const bounty of participantBounties) {
    const reward = Number(bounty.reward || 0);
    const isCreator = bounty.creator === user.address;
    const isContributor = bounty.contributor === user.address;
    const bountyLabel = bounty.title || `Bounty ${String(bounty.id).slice(0, 8)}`;
    const txRef = bounty.txId ? ` · ${String(bounty.txId).slice(0, 10)}…` : "";

    if (isCreator && bounty.createdAt) {
      entries.push({
        id: `${bounty.id}-posted`,
        title: bountyLabel,
        event: "Escrow funded",
        amount: reward,
        direction: "out",
        status: "Sent to escrow",
        date: bounty.createdAt,
        note: `Posted by you${txRef}`,
      });
    }

    if (isContributor && bounty.acceptedAt) {
      entries.push({
        id: `${bounty.id}-accepted`,
        title: bountyLabel,
        event: "Bounty accepted",
        amount: reward,
        direction: "neutral",
        status: "Work in progress",
        date: bounty.acceptedAt,
        note: "You accepted this bounty",
      });
    }

    if (isContributor && bounty.submittedAt) {
      entries.push({
        id: `${bounty.id}-submitted`,
        title: bountyLabel,
        event: "Work submitted",
        amount: reward,
        direction: "neutral",
        status: "Awaiting review",
        date: bounty.submittedAt,
        note: "Submission delivered to escrow review",
      });
    }

    if (bounty.rejectedAt && (isCreator || isContributor)) {
      entries.push({
        id: `${bounty.id}-rejected`,
        title: bountyLabel,
        event: "Submission rejected",
        amount: reward,
        direction: "neutral",
        status: STATUS_LABEL[bounty.status] || "Rejected",
        date: bounty.rejectedAt,
        note: "Dispute window opened",
      });
    }

    if (bounty.disputedAt && (isCreator || isContributor)) {
      entries.push({
        id: `${bounty.id}-disputed`,
        title: bountyLabel,
        event: "Dispute raised",
        amount: reward,
        direction: "neutral",
        status: "In dispute",
        date: bounty.disputedAt,
        note: "Automated rules evaluation",
      });
    }

    if (bounty.resolvedAt) {
      let include = false;
      let event = "Lifecycle update";
      let direction = "neutral";
      let status = STATUS_LABEL[bounty.status] || "Updated";
      let note = "";

      if (bounty.status === STATUS_APPROVED || bounty.status === STATUS_RESOLVED_WORKER) {
        include = isCreator || isContributor;
        event = isContributor ? "Payout received" : "Escrow released";
        direction = isContributor ? "in" : "out";
        note = bounty.status === STATUS_APPROVED ? "Approved by creator" : "Dispute resolved for contributor";
      } else if (bounty.status === STATUS_RESOLVED_CREATOR || bounty.status === STATUS_CANCELLED) {
        include = isCreator || isContributor;
        event = isCreator ? "Refund received" : "Escrow closed";
        direction = isCreator ? "in" : "neutral";
        note = bounty.status === STATUS_CANCELLED ? "Bounty cancelled" : "Dispute resolved for creator";
      } else if (bounty.status === STATUS_OPTED_OUT) {
        include = isCreator || isContributor;
        event = isCreator ? "Refund received" : "Opted out";
        direction = isCreator ? "in" : "out";
        note = "Contributor exited after rejection";
      }

      if (include) {
        entries.push({
          id: `${bounty.id}-resolved`,
          title: bountyLabel,
          event,
          amount: reward,
          direction,
          status,
          date: bounty.resolvedAt,
          note,
        });
      }
    }
  }

  return entries.sort((a, b) => Number(b.date || 0) - Number(a.date || 0));
}

function renderTransactions() {

  return `

                      <div style="font-size:14px; font-weight:700; color:${entry.direction === "in" ? "var(--success)" : entry.direction === "out" ? "var(--text-primary)" : "var(--text-secondary)"};">${getTransactionAmountLabel(entry)}</div>
                      <div>

                        <div style="margin-top:4px; font-size:13px; color:var(--text-primary);">${escapeHtml(entry.status)}</div>

            </div>`
      }
    </div>
  `;
}
